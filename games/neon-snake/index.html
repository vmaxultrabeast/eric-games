<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- Game Stats Header -->
        <div class="game-header">
            <div class="score-box">
                <span class="label">SCORE</span>
                <span id="scoreVal" class="value">000</span>
            </div>
            <div class="title-box">
                <h1>NEON <span class="cyan-text">SNAKE</span></h1>
            </div>
            <div class="score-box">
                <span class="label">HI-SCORE</span>
                <span id="highScoreVal" class="value">000</span>
            </div>
        </div>

        <!-- Main Screen -->
        <div class="screen-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <!-- Start/Overlay Screens -->
            <div id="overlayScreen" class="overlay active">
                <div class="overlay-content">
                    <h2 id="overlayTitle">NEON SNAKE</h2>
                    <p id="overlayMessage">Press SPACE or Click START to play</p>
                    
                    <!-- Color Picker -->
                    <div class="color-picker-container">
                        <label>Choose Color</label>
                        <div class="color-options">
                            <button type="button" class="color-btn active" data-color="#9d4edd" style="--color-theme: #9d4edd; background: #9d4edd;" title="Purple"></button>
                            <button type="button" class="color-btn" data-color="#39ff14" style="--color-theme: #39ff14; background: #39ff14;" title="Green"></button>
                            <button type="button" class="color-btn" data-color="#ff007f" style="--color-theme: #ff007f; background: #ff007f;" title="Pink"></button>
                            <button type="button" class="color-btn" data-color="#ffdd44" style="--color-theme: #ffdd44; background: #ffdd44;" title="Yellow"></button>
                            <button type="button" class="color-btn" data-color="#00f5ff" style="--color-theme: #00f5ff; background: #00f5ff;" title="Cyan"></button>
                        </div>
                    </div>
                    
                    <button id="startBtn" class="glow-btn">START GAME</button>
                </div>
            </div>
        </div>

        <!-- Virtual Controls for Mobile/Touch -->
        <div class="touch-controls">
            <div class="dpad-row">
                <button class="dpad-btn" id="btnUp"><i class="fa-solid fa-caret-up"></i></button>
            </div>
            <div class="dpad-row dpad-mid">
                <button class="dpad-btn" id="btnLeft"><i class="fa-solid fa-caret-left"></i></button>
                <div class="dpad-center"></div>
                <button class="dpad-btn" id="btnRight"><i class="fa-solid fa-caret-right"></i></button>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" id="btnDown"><i class="fa-solid fa-caret-down"></i></button>
            </div>
        </div>

        <!-- Mobile Pause Toggle -->
        <div class="mobile-options">
            <button id="pauseToggleBtn" class="opt-btn"><i class="fa-solid fa-pause"></i> Pause (P)</button>
        </div>
    </div>

    <!-- Side Controls for Touchscreens -->
    <div class="side-controls-left">
        <button class="side-btn" id="sideBtnLeft" title="Move Left"><i class="fa-solid fa-caret-left"></i></button>
        <button class="side-btn" id="sideBtnRight" title="Move Right"><i class="fa-solid fa-caret-right"></i></button>
    </div>
    <div class="side-controls-right">
        <button class="side-btn" id="sideBtnUp" title="Move Up"><i class="fa-solid fa-caret-up"></i></button>
        <button class="side-btn" id="sideBtnDown" title="Move Down"><i class="fa-solid fa-caret-down"></i></button>
    </div>

    <script src="game.js"></script>
</body>
</html>
